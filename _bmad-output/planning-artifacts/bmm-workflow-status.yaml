  - phase: 1
    name: 'Analysis'
    workflows:
      - id: 'brainstorm-project'
        name: 'Brainstorm'
        agent: 'analyst'
        command: '/bmad:bmm:workflows:brainstorming'
        status: 'skipped'

      - id: 'research'
        name: 'Research'
        agent: 'analyst'
        command: '/bmad:bmm:workflows:research'
